steps:
  # 1. Dockerイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sales-aggregator:$COMMIT_SHA', '.']

  # 2. DockerイメージをGCP (Container Registry) にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sales-aggregator:$COMMIT_SHA']

  # 3. Cloud Runへの自動デプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sales-aggregator'  # Cloud Runのサービス名
      - '--image'
      - 'gcr.io/$PROJECT_ID/sales-aggregator:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'   # 東京リージョン
      - '--allow-unauthenticated'

# 正常終了時にイメージを登録
images:
  - 'gcr.io/$PROJECT_ID/sales-aggregator:$COMMIT_SHA'
